# Netlify Deploy Configuration
# 使い方: このファイルを deploy-config.yml にコピーして設定を記入
# cp deploy-config.netlify.example deploy-config.yml

provider: netlify

environments:
  production:
    branch: main
    auto_deploy: true
  staging:
    branch: develop
    auto_deploy: true
  preview:
    auto_deploy: true

providers:
  netlify:
    # 必須設定
    site_id: ${NETLIFY_SITE_ID}
    token: ${NETLIFY_TOKEN}

    # オプション設定
    # build_command: npm run build  # ビルドコマンド
    # publish_directory: out        # 公開ディレクトリ（デフォルト: out）

# GitHub Secrets に以下を設定:
# - NETLIFY_SITE_ID: Netlify Site ID
# - NETLIFY_TOKEN: Netlify Personal Access Token
#
# 取得方法:
# 1. https://app.netlify.com にログイン
# 2. Site settings → Site details → API ID（= Site ID）
# 3. User settings → Applications → Personal access tokens → New
