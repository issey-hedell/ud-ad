# Firebase Hosting Deploy Configuration
# 使い方: このファイルを deploy-config.yml にコピーして設定を記入
# cp deploy-config.firebase.example deploy-config.yml

provider: firebase

environments:
  production:
    branch: main
    auto_deploy: true
  staging:
    branch: develop
    auto_deploy: true
  preview:
    auto_deploy: true

providers:
  firebase:
    # 必須設定
    project_id: ${FIREBASE_PROJECT_ID}
    token: ${FIREBASE_TOKEN}

    # オプション設定（Preview環境用）
    # preview_channel: preview  # Previewチャンネル名

# GitHub Secrets に以下を設定:
# - FIREBASE_PROJECT_ID: Firebase Project ID
# - FIREBASE_TOKEN: Firebase CI Token
#
# 取得方法:
# 1. Firebase Console でプロジェクトを作成/選択
# 2. Project settings → General → Project ID
# 3. Firebase CLI でトークンを取得:
#    firebase login:ci
#
# 前提条件:
# - firebase.json がリポジトリルートに存在
# - Hosting が有効化されている
